function getFilteredROI() {
  const roi = DASHBOARD_DATA.roi || {};
  const baseBets = (roi.bets || []).slice();

  // Merge localStorage betting panel data into ROI
  // Only merge from meetings with analysis data (avoids ghost entries)
  const localBets = [];
  const meetings = DASHBOARD_DATA.meetings || [];
  meetings.forEach(m => {
    const k = `bets_${m.date}_${m.venue}`;
    let meetingBets = {};
    try { meetingBets = JSON.parse(localStorage.getItem(k) || '{}'); } catch(e) { return; }
    if (!Object.keys(meetingBets).length) return;

    const racesData = getRacesData(m);
    if (!racesData) return;
    const analysts = Object.keys(racesData.races_by_analyst);
    const races = racesData.races_by_analyst[analysts[0]] || [];

    // Build horse name lookup
    const horseMap = {};
    races.forEach(race => {
      (race.horses || []).forEach(horse => {
        horseMap[betKey(m.date, m.venue, race.race_number, horse.horse_number)] = {
          horse_name: horse.horse_name, jockey: horse.jockey || '', trainer: horse.trainer || '',
          race_number: race.race_number, horse_number: horse.horse_number,
        };
      });
    });

    // Only process bets that match known horses
    Object.keys(meetingBets).forEach(bk => {
      const s = meetingBets[bk];
      if (!s || !s.confirmed || s.scratched) return;
      const info = horseMap[bk];
      if (!info) return; // Skip unknown horses
      const profit = calcProfit(s);
      const pos = s.result;
      localBets.push({
        date: m.date, venue: m.venue, region: m.region,
        race_number: info.race_number, horse_number: info.horse_number,
        horse_name: info.horse_name, jockey: info.jockey, trainer: info.trainer,
        stake: 1, odds: s.odds || 0,
        result_position: pos,
        payout: (pos >= 1 && pos <= 3) ? (s.odds || 0) : 0,
        net_profit: profit !== null ? profit : -1,
        status: pos >= 1 && pos <= 3 ? 'won' : (pos === null || pos === undefined) ? 'pending' : 'lost',
        source: 'local',
      });
    });
  });

  // Deduplicate: remove baseBets that match a localBet (same date+venue+race+horse)
  const localKeys = new Set(localBets.map(b => `${b.date}|${b.venue}|${b.race_number}|${b.horse_number}`));
  const deduped = baseBets.filter(b => !localKeys.has(`${b.date}|${b.venue}|${b.race_number}|${b.horse_number}`));
  const allBets = [...deduped, ...localBets];
  allBets.sort((a,b) => (a.date||'').localeCompare(b.date||''));

  // Apply region filter
  const bets = roiRegionFilter ? allBets.filter(b => b.region === roiRegionFilter) : allBets;

  // Recompute totals
  const totalStake = bets.reduce((s,b) => s + (b.stake||0), 0);
  const totalPayout = bets.reduce((s,b) => s + (b.payout||0), 0);
  const totalProfit = bets.reduce((s,b) => s + (b.net_profit||0), 0);
  const wins = bets.filter(b => b.status === 'won').length;
  const losses = bets.filter(b => b.status === 'lost').length;
  const winRate = (wins + losses) > 0 ? Math.round(wins/(wins+losses)*1000)/10 : 0;
  const roiPct = totalStake > 0 ? Math.round(totalProfit/totalStake*1000)/10 : 0;
  let cum = 0;
  const settled = bets.filter(b => b.status !== 'pending');
  const rp = settled.map(b => { cum += (b.net_profit||0); return {date:b.date,venue:b.venue,race_number:b.race_number,horse_name:b.horse_name,profit:b.net_profit||0,cumulative:Math.round(cum*100)/100}; });
  // Daily breakdown
  const dm = {};
  bets.forEach(b => {
    const k = `${b.date}-${b.venue}`;
    if (!dm[k]) dm[k] = {date:b.date,venue:b.venue,region:b.region,bets:0,stake:0,payout:0,profit:0,wins:0};
    dm[k].bets++; dm[k].stake += b.stake||0; dm[k].payout += b.payout||0; dm[k].profit += b.net_profit||0;
    if (b.status==='won') dm[k].wins++;
  });
  const db = Object.values(dm).map(d => ({...d, profit:Math.round(d.profit*100)/100}));
  db.sort((a,b) => b.date.localeCompare(a.date));
  return {total_bets:bets.length,total_stake:Math.round(totalStake*100)/100,total_payout:Math.round(totalPayout*100)/100,total_profit:Math.round(totalProfit*100)/100,roi_pct:roiPct,win_rate:winRate,wins,losses,running_profit:rp,daily_breakdown:db,side_roi:roi.side_roi,bets};
}

function renderROI() {
  const roi = getFilteredROI();
  if (!roi || !roi.total_bets) {
    return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px">
      <h1 style="font-size:1.5rem;font-weight:800;letter-spacing:-0.02em">📊 ROI 分析</h1>
      ${renderRegionTabs()}
    </div>
    <div class="empty-state" style="margin-top:40px"><div class="empty-state__icon">📊</div><div class="empty-state__text">暫無投注數據</div></div>`;
  }
  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px">
    <h1 style="font-size:1.5rem;font-weight:800;letter-spacing:-0.02em">📊 ROI 分析</h1>
    ${renderRegionTabs()}
  </div>`;
  html += renderStatsCards(roi);
  if (roi.running_profit?.length > 0) html += renderProfitChart(roi.running_profit);
  if (roi.side_roi && !roiRegionFilter) html += renderSideBreakdowns(roi.side_roi);
  if (roi.daily_breakdown?.length > 0) html += renderMonthlyBreakdown(roi.daily_breakdown, roi.bets || []);
  return html;
}

function renderRegionTabs() {
  const tabs = [{val:null,label:'全部'},{val:'hkjc',label:'🇭🇰 HKJC'},{val:'au',label:'🇦🇺 AU'}];
  return `<div style="display:flex;gap:4px;background:#F1F5F9;border-radius:8px;padding:3px">${tabs.map(t =>
    `<button class="${roiRegionFilter===t.val?'btn btn--primary btn--sm':'btn btn--ghost btn--sm'}" onclick="setRoiRegion(${t.val===null?'null':"'"+t.val+"'"})">` + esc(t.label) + '</button>'
  ).join('')}</div>`;
}

function renderStatsCards(roi) {
  const p = roi.total_profit||0;
  const isUp = p >= 0;
  const cards = [
    {icon:'🎯',val:roi.total_bets,label:'總投注數'},
    {icon:'💵',val:`$${roi.total_stake}`,label:'總投入'},
    {icon:'💰',val:`$${roi.total_payout}`,label:'總回報'},
    {icon:isUp?'📈':'📉',val:`${isUp?'+':''}$${p}`,label:'總淨利',color:isUp?'#059669':'#DC2626'},
    {icon:'📊',val:`${roi.roi_pct}%`,label:'ROI',color:roi.roi_pct>=0?'#059669':'#DC2626',hl:true},
    {icon:'🏆',val:`${roi.win_rate}%`,label:'勝率'},
    {icon:'⚖️',val:`${roi.wins}/${roi.losses}`,label:'勝/負'},
  ];
  return `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:16px">${cards.map(c =>
    `<div class="card" style="padding:12px;text-align:center${c.hl?';border:2px solid '+(c.color||'#2563EB'):''}"><div style="font-size:1.4rem;margin-bottom:4px">${c.icon}</div><div style="font-size:${c.hl?'1.3rem':'1.1rem'};font-weight:800;color:${c.color||'#0F172A'};letter-spacing:-0.01em">${c.val}</div><div style="font-size:0.7rem;color:#94A3B8;margin-top:2px">${c.label}</div></div>`
  ).join('')}</div>`;
}

function renderProfitChart(data) {
  if (!data.length) return '';
  const values = data.map(d => d.cumulative);
  const max = Math.max(...values, 0), min = Math.min(...values, 0);
  const range = max - min || 1;
  const W=800,H=300,pL=50,pB=30,pT=20,pR=20;
  const cW=W-pL-pR, cH=H-pT-pB;
  const zeroY = pT + cH - ((0-min)/range)*cH;
  const pts = data.map((d,i) => ({x:pL+(i/(data.length-1||1))*cW, y:pT+cH-((d.cumulative-min)/range)*cH, date:d.date}));
  // SVG lines
  let lines = '';
  for (let i=1;i<pts.length;i++) {
    const col = (values[i]>=0 && values[i-1]>=0) ? '#059669' : '#DC2626';
    lines += `<line x1="${pts[i-1].x}" y1="${pts[i-1].y}" x2="${pts[i].x}" y2="${pts[i].y}" stroke="${col}" stroke-width="2" stroke-linecap="round"/>`;
  }
  // Fill path
  const fillPts = pts.map(p => `L ${p.x},${p.y}`).join(' ');
  const fillPath = `M ${pts[0].x},${zeroY} ${fillPts} L ${pts[pts.length-1].x},${zeroY} Z`;
  const last = pts[pts.length-1];
  const lastV = values[values.length-1];
  const isUp = lastV >= 0;
  const gradId = isUp ? 'profitFill' : 'lossFill';
  // Y ticks
  let yTicks = '';
  const step = range/4;
  for (let i=0;i<=4;i++) {
    const val = min+step*i;
    const y = pT+cH-((val-min)/range)*cH;
    yTicks += `<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#F1F5F9" stroke-width="1"/><text x="${pL-6}" y="${y+3}" text-anchor="end" font-size="10" fill="#94A3B8">$${Math.round(val)}</text>`;
  }
  // Month labels
  const seen = new Set();
  let mLabels = '';
  let prevX = -100;
  data.forEach((d,i) => {
    const ds = d.date||'';
    let mk='',label='';
    if (ds.includes('-')&&ds.length>=7) { const p=ds.split('-'); mk=p[0]+'-'+p[1]; const m=parseInt(p[1]); const mn=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; label=`${mn[m]||m}/${p[0].slice(-2)}`; }
    else if (ds.includes('.')) { const m=ds.split('.')[0]; mk=m; const mn={'1':'Jan','2':'Feb','3':'Mar'}; label=`${mn[m]||m}/26`; }
    if (mk && !seen.has(mk) && pts[i].x - prevX > 60) { seen.add(mk); prevX=pts[i].x;
      mLabels += `<line x1="${pts[i].x}" y1="${pT}" x2="${pts[i].x}" y2="${pT+cH}" stroke="#F1F5F9" stroke-dasharray="2,4" stroke-width="1"/><text x="${pts[i].x}" y="${H-6}" text-anchor="middle" font-size="10" fill="#64748B" font-weight="600">${label}</text>`;
    }
  });
  // Interactive hover dots for each data point
  const chartId = 'roi-chart-' + Math.random().toString(36).slice(2,8);
  let hoverDots = '';
  data.forEach((d, i) => {
    const col = values[i] >= 0 ? '#059669' : '#DC2626';
    const pStr = values[i] >= 0 ? '+' : '';
    hoverDots += `<circle cx="${pts[i].x}" cy="${pts[i].y}" r="12" fill="transparent" style="cursor:pointer" 
      onmouseenter="showChartTip('${chartId}',event,${pts[i].x},${pts[i].y},'${esc(d.date)} · ${esc(d.horse_name||'')}','${pStr}$${d.cumulative}','${col}')" 
      onmouseleave="hideChartTip('${chartId}')"/>`;
    hoverDots += `<circle cx="${pts[i].x}" cy="${pts[i].y}" r="3" fill="${col}" opacity="0" pointer-events="none" class="chart-dot-${chartId}-${i}"/>`;
  });
  return `<div class="card" style="margin-bottom:16px;padding:16px;position:relative"><div style="font-size:0.8rem;font-weight:700;margin-bottom:8px;color:#64748B">📊 累計損益走勢</div>
    <div id="${chartId}-tip" class="chart-tooltip"></div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:320px" id="${chartId}">
      <defs><linearGradient id="profitFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#059669" stop-opacity="0.3"/><stop offset="100%" stop-color="#059669" stop-opacity="0.02"/></linearGradient>
      <linearGradient id="lossFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#DC2626" stop-opacity="0.02"/><stop offset="100%" stop-color="#DC2626" stop-opacity="0.3"/></linearGradient></defs>
      ${yTicks}
      <line x1="${pL}" y1="${zeroY}" x2="${W-pR}" y2="${zeroY}" stroke="#CBD5E1" stroke-dasharray="4,4" stroke-width="1"/>
      <text x="${pL-6}" y="${zeroY+3}" text-anchor="end" font-size="10" fill="#64748B" font-weight="600">$0</text>
      <path d="${fillPath}" fill="url(#${gradId})"/>
      ${lines}
      ${hoverDots}
      <circle cx="${last.x}" cy="${last.y}" r="4" fill="${isUp?'#059669':'#DC2626'}"/>
      <text x="${last.x}" y="${last.y-10}" text-anchor="end" font-size="12" font-weight="700" fill="${isUp?'#059669':'#DC2626'}">${isUp?'+':''}$${lastV}</text>
      ${mLabels}
    </svg></div>`;
}

function renderSideBreakdowns(side) {
  const sections = [
    {key:'by_venue',title:'🏟️ 馬場分析',label:'馬場'},
    {key:'by_distance',title:'📏 路程分析',label:'路程'},
    {key:'by_class',title:'🏆 班次分析',label:'班次'},
  ];
  if (side.by_track?.length > 0) sections.push({key:'by_track',title:'🛤️ 賽道分析',label:'賽道'});
  if (side.by_jockey?.length > 0) sections.push({key:'by_jockey',title:'🏇 騎師分析',label:'騎師'});
  if (side.by_trainer?.length > 0) sections.push({key:'by_trainer',title:'🏠 練馬師分析',label:'練馬師'});
  const has = sections.some(s => (side[s.key]||[]).length > 0);
  if (!has) return '';
  let html = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px;margin-bottom:16px">';
  sections.forEach(({key,title,label}) => {
    let items = [...(side[key] || [])];
    if (!items.length) return;
    items.sort((a,b) => b.total_profit - a.total_profit);
    html += `<div class="card" style="padding:16px"><h3 style="font-size:0.85rem;font-weight:700;margin-bottom:10px;color:#475569">${title}</h3>
      <table style="width:100%;border-collapse:collapse;font-size:0.75rem"><thead><tr style="border-bottom:1px solid #E2E8F0;color:#94A3B8">
        <th style="padding:4px 6px;text-align:left">${label}</th><th style="padding:4px 6px;text-align:right">注數</th><th style="padding:4px 6px;text-align:right">勝率</th><th style="padding:4px 6px;text-align:right">淨利</th><th style="padding:4px 6px;text-align:right">ROI</th>
      </tr></thead><tbody>`;
    items.forEach(it => {
      const isUp = it.total_profit >= 0;
      html += `<tr style="border-bottom:1px solid #F8FAFC"><td style="padding:4px 6px;font-weight:600">${esc(it.name)}</td>
        <td style="padding:4px 6px;text-align:right;color:#64748B">${it.total_bets||'-'}</td>
        <td style="padding:4px 6px;text-align:right;color:#64748B">${it.win_rate!=null?it.win_rate+'%':'-'}</td>
        <td style="padding:4px 6px;text-align:right;font-weight:700;color:${isUp?'#059669':'#DC2626'}">${isUp?'+':''}$${it.total_profit}</td>
        <td style="padding:4px 6px;text-align:right;color:${it.roi_pct>=0?'#059669':'#DC2626'}">${it.roi_pct}%</td></tr>`;
    });
    html += '</tbody></table></div>';
  });
  html += '</div>';
  return html;
}

function normalizeDate(ds) {
  if (!ds) return '';
  if (ds.includes('-') && ds.length >= 8) return ds;
  if (ds.includes('.')) { const [m,d] = ds.split('.'); return `2026-${m.padStart(2,'0')}-${(d||'01').padStart(2,'0')}`; }
  return ds;
}
function getMonthKey(ds) {
  if (!ds) return 'unknown';
  if (ds.includes('-') && ds.length >= 7) return ds.substring(0,7);
  if (ds.includes('.')) return `2026-${ds.split('.')[0].padStart(2,'0')}`;
  return 'unknown';
}
function getMonthLabel(ds) {
  const names = {'01':'January','02':'February','03':'March','04':'April','05':'May','06':'June','07':'July','08':'August','09':'September','10':'October','11':'November','12':'December'};
  let m='',y='';
  if (ds?.includes('-') && ds.length >= 7) { const p=ds.split('-'); m=p[1]; y=p[0].slice(-2); }
  else if (ds?.includes('.')) { m=ds.split('.')[0].padStart(2,'0'); y='26'; }
  return `${names[m]||m} '${y}`;
}

function renderMonthlyBreakdown(sessions, bets) {
  const sorted = [...sessions].sort((a,b) => normalizeDate(b.date).localeCompare(normalizeDate(a.date)));
  const groups = [];
  let curMonth = '', curGroup = null;
  for (const s of sorted) {
    const mk = getMonthKey(s.date);
    if (mk !== curMonth) { curMonth = mk; curGroup = {key:mk,label:getMonthLabel(s.date),sessions:[],totalProfit:0,totalBets:0}; groups.push(curGroup); }
    curGroup.sessions.push(s); curGroup.totalProfit += s.profit||0; curGroup.totalBets += s.bets||0;
  }
  let html = '<div style="margin-top:16px"><h3 style="font-size:0.9rem;font-weight:700;margin-bottom:12px;color:#475569">📅 每日投注明細</h3>';
  groups.forEach(g => {
    const isUp = g.totalProfit >= 0;
    html += `<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#F8FAFC;border-radius:8px;margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:8px"><span style="font-size:0.85rem;font-weight:700;color:#334155">📆 ${esc(g.label)}</span><span style="font-size:0.7rem;color:#94A3B8">${g.totalBets} 注</span></div>
      <span style="font-weight:800;font-size:0.85rem;color:${isUp?'#059669':'#DC2626'}">${isUp?'+':''}$${g.totalProfit.toFixed(2)}</span></div>`;
    g.sessions.forEach(s => {
      const key = `${s.date}-${s.venue}`;
      const isExp = expandedSession === key;
      const p = s.profit||0;
      const sBets = bets.filter(b => b.date===s.date && b.venue===s.venue);
      html += `<div class="card" style="margin-bottom:4px;padding:0;overflow:hidden">
        <button onclick="toggleSession('${key}')" style="width:100%;padding:12px 16px;background:none;border:none;cursor:pointer;text-align:left;font-family:Inter,sans-serif;display:flex;justify-content:space-between;align-items:center">
          <div style="display:flex;align-items:center;gap:10px"><span style="font-weight:600;font-size:0.8rem;color:#334155;min-width:80px">${esc(s.date)}</span><span class="badge badge--region-${s.region}">${esc(s.venue)}</span><span style="color:#94A3B8;font-size:0.7rem">${s.bets} 注</span></div>
          <div style="display:flex;align-items:center;gap:10px"><span style="font-weight:800;font-size:0.85rem;color:${p>=0?'#059669':'#DC2626'}">${p>=0?'+':''}$${p.toFixed(2)}</span><span style="font-size:0.7rem;color:#94A3B8">${isExp?'▲':'▼'}</span></div>
        </button>`;
      if (isExp && sBets.length) {
        html += '<div style="border-top:1px solid #F1F5F9;padding:12px 16px;overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:0.75rem"><thead><tr style="border-bottom:1px solid #E2E8F0;color:#94A3B8"><th style="padding:4px 8px;text-align:left">場次</th><th style="padding:4px 8px;text-align:left">馬匹</th><th style="padding:4px 8px;text-align:left">賠率</th><th style="padding:4px 8px;text-align:left">名次</th><th style="padding:4px 8px;text-align:left">狀態</th><th style="padding:4px 8px;text-align:right">淨利</th></tr></thead><tbody>';
        sBets.forEach(b => {
          const bc = b.net_profit>0?'#059669':b.net_profit<0?'#DC2626':'#94A3B8';
          const stBg = b.status==='won'?'#D1FAE5':b.status==='lost'?'#FEE2E2':'#FEF3C7';
          const stCol = b.status==='won'?'#059669':b.status==='lost'?'#DC2626':'#D97706';
          const stLabel = b.status==='won'?'✅':b.status==='lost'?'❌':'⏳';
          html += `<tr style="border-bottom:1px solid #F8FAFC"><td style="padding:4px 8px">R${b.race_number}</td><td style="padding:4px 8px"><strong>#${b.horse_number}</strong> ${esc(b.horse_name)}</td><td style="padding:4px 8px">${b.odds||'—'}</td><td style="padding:4px 8px">${b.result_position||'—'}</td><td style="padding:4px 8px"><span style="background:${stBg};color:${stCol};padding:1px 6px;border-radius:999px;font-size:0.65rem;font-weight:700">${stLabel}</span></td><td style="padding:4px 8px;text-align:right;font-weight:700;color:${bc}">${b.net_profit!=null?`${b.net_profit>0?'+':''}$${b.net_profit.toFixed(2)}`:'—'}</td></tr>`;
        });
        html += '</tbody></table></div>';
      }
      html += '</div>';
    });
    html += '</div>';
  });
  html += '</div>';
  return html;
}

// Render
// ═══════════════════════════════════════════════
function render() {
  const main = document.getElementById('app-main');
  // Update nav active state
  document.getElementById('nav-races').className = currentView !== 'roi' ? 'nav-pill nav-pill--active' : 'nav-pill';
  document.getElementById('nav-roi').className = currentView === 'roi' ? 'nav-pill nav-pill--active' : 'nav-pill';
  if (currentView === 'race') {
    main.innerHTML = renderRaceDetail();
  } else if (currentView === 'roi') {
    main.innerHTML = renderROI();
  } else {
    main.innerHTML = renderDashboard();
  }
}

// Chart tooltip functions
function showChartTip(chartId, evt, svgX, svgY, label, value, color) {
  const tip = document.getElementById(chartId + '-tip');
  const svg = document.getElementById(chartId);
  if (!tip || !svg) return;
  const rect = svg.getBoundingClientRect();
  const scaleX = rect.width / 800;
  const scaleY = rect.height / 300;
  const x = svgX * scaleX;
  const y = svgY * scaleY;
  tip.innerHTML = `<div style="font-weight:600;margin-bottom:2px">${label}</div><div style="color:${color};font-weight:800;font-size:0.8rem">${value}</div>`;
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
  tip.classList.add('chart-tooltip--visible');
}
function hideChartTip(chartId) {
  const tip = document.getElementById(chartId + '-tip');
  if (tip) tip.classList.remove('chart-tooltip--visible');
}

// Back to top scroll listener
window.addEventListener('scroll', () => {
  const btn = document.getElementById('backToTop');
  if (btn) {
    if (window.scrollY > 400) btn.classList.add('back-to-top--visible');
    else btn.classList.remove('back-to-top--visible');
  }
}, { passive: true });

// Init
document.addEventListener('DOMContentLoaded', () => {
  if (DASHBOARD_DATA.meetings.length) {
    selectedMeeting = DASHBOARD_DATA.meetings[0];
    loadBettingState();
    const rd = getRacesData(selectedMeeting);
    if (rd) getMergedRaces(rd).forEach(r => expandedBetRaces.add(r.race_number));
  }
  showDashboard();
});
</script>
